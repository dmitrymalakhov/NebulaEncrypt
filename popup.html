<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --app-bg: #f4f7f9;
        --surface: #ffffff;
        --surface-muted: #edf3f5;
        --surface-hover: #e5eef1;
        --fg: #12212a;
        --muted: #5f6f7a;
        --border: #d7e1e6;
        --accent: #0f766e;
        --accent-hover: #0b5f59;
        --accent-soft: #dff4f1;
        --success-bg: #dff5e8;
        --success-fg: #0f6b3f;
        --success-border: #a9ddc0;
        --warning-bg: #fff4d8;
        --warning-fg: #99600d;
        --warning-border: #e6c574;
        --error-bg: #fde7e4;
        --error-fg: #a12a1f;
        --error-border: #efb0aa;
        --input-bg: #ffffff;
        --input-border: #cfdbe1;
        --kbd-bg: #e8eef1;
        --strength-0: #c9d4da;
        --strength-1: #d94b3d;
        --strength-2: #d57b1f;
        --strength-3: #c7a318;
        --strength-4: #15945b;
        --shadow: 0 18px 40px rgba(18, 33, 42, 0.14);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --app-bg: #10171b;
          --surface: #162127;
          --surface-muted: #1e2b32;
          --surface-hover: #26363f;
          --fg: #e8f0f2;
          --muted: #9aaab2;
          --border: #30414a;
          --accent: #2db8a8;
          --accent-hover: #39cdbd;
          --accent-soft: #123a38;
          --success-bg: #123a29;
          --success-fg: #7be0a4;
          --success-border: #226b45;
          --warning-bg: #3a2c12;
          --warning-fg: #efc86f;
          --warning-border: #735b24;
          --error-bg: #3a1d1a;
          --error-fg: #f29b91;
          --error-border: #76413b;
          --input-bg: #111a20;
          --input-border: #33464f;
          --kbd-bg: #26353d;
          --strength-0: #3b4a51;
        }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: var(--app-bg); }
      body {
        width: 410px;
        min-width: 410px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--app-bg);
        color: var(--fg);
        font-size: 13px;
        line-height: 1.45;
      }
      button, input, select {
        font: inherit;
      }
      button {
        cursor: pointer;
        border: 0;
      }
      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .brand {
        display: grid;
        grid-template-columns: 44px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .brand-mark {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: var(--accent-soft);
        border: 1px solid var(--accent);
      }
      .brand-mark img {
        width: 28px;
        height: 28px;
        display: block;
      }
      .brand-name {
        font-size: 17px;
        font-weight: 760;
        letter-spacing: 0;
      }
      .brand-tagline {
        color: var(--muted);
        font-size: 11px;
        margin-top: 1px;
      }
      .brand-badge {
        align-self: start;
        min-width: 34px;
        padding: 3px 7px;
        border-radius: 999px;
        background: var(--surface-muted);
        color: var(--muted);
        font-size: 11px;
        text-align: center;
        border: 1px solid var(--border);
      }
      .shell {
        padding: 12px 14px 14px;
      }
      .command-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }
      .btn-action,
      .primary-button,
      .secondary-button,
      .icon-button,
      .danger-button {
        min-height: 36px;
        border-radius: 7px;
        transition: background 0.16s ease, border-color 0.16s ease, transform 0.08s ease;
      }
      .btn-action:active,
      .primary-button:active,
      .secondary-button:active,
      .icon-button:active,
      .danger-button:active {
        transform: translateY(1px);
      }
      .btn-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 9px 10px;
        font-weight: 700;
        border: 1px solid transparent;
      }
      .btn-encrypt {
        background: var(--accent);
        color: #ffffff;
      }
      .btn-encrypt:hover { background: var(--accent-hover); }
      .btn-decrypt {
        background: var(--surface);
        color: var(--fg);
        border-color: var(--border);
      }
      .btn-decrypt:hover { background: var(--surface-hover); }
      .button-symbol {
        font-size: 14px;
        line-height: 1;
      }
      .context-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .context-chip,
      .key-state {
        min-width: 0;
        padding: 5px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .context-chip { flex: 1; }
      .key-state { flex: 0 0 auto; }
      .context-chip.is-ok,
      .key-state.is-ok {
        background: var(--success-bg);
        border-color: var(--success-border);
        color: var(--success-fg);
      }
      .context-chip.is-warn,
      .key-state.is-warn {
        background: var(--warning-bg);
        border-color: var(--warning-border);
        color: var(--warning-fg);
      }
      .section {
        padding: 12px 0;
        border-top: 1px solid var(--border);
      }
      .section:first-of-type {
        border-top: 0;
        padding-top: 0;
      }
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }
      .section-title {
        font-size: 12px;
        font-weight: 760;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .field {
        margin-top: 9px;
      }
      .field:first-child {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      input,
      select {
        width: 100%;
        height: 36px;
        padding: 8px 10px;
        border: 1px solid var(--input-border);
        border-radius: 7px;
        background: var(--input-bg);
        color: var(--fg);
        outline: none;
      }
      input[readonly] {
        color: var(--muted);
        background: var(--surface-muted);
      }
      .key-row {
        display: grid;
        grid-template-columns: 1fr 36px 36px;
        gap: 6px;
        align-items: center;
      }
      .key-row.backup-row {
        grid-template-columns: 1fr 36px;
      }
      .icon-button {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        background: var(--surface);
        color: var(--fg);
        border: 1px solid var(--border);
        font-size: 14px;
      }
      .icon-button:hover {
        background: var(--surface-hover);
      }
      .strength-bar {
        height: 4px;
        border-radius: 999px;
        background: var(--strength-0);
        margin-top: 6px;
        overflow: hidden;
      }
      .strength-bar .fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        transition: width 0.18s ease, background 0.18s ease;
      }
      .primary-button {
        width: 100%;
        margin-top: 10px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 760;
      }
      .primary-button:hover {
        background: var(--accent-hover);
      }
      .status {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 7px;
        font-size: 12px;
        display: none;
        border: 1px solid transparent;
      }
      .status.success {
        background: var(--success-bg);
        color: var(--success-fg);
        border-color: var(--success-border);
        display: block;
      }
      .status.error {
        background: var(--error-bg);
        color: var(--error-fg);
        border-color: var(--error-border);
        display: block;
      }
      .actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .secondary-button {
        background: var(--surface);
        color: var(--fg);
        border: 1px solid var(--border);
        font-weight: 700;
      }
      .secondary-button:hover {
        background: var(--surface-hover);
      }
      .saved-list {
        display: grid;
        gap: 6px;
      }
      .saved-list:empty::after {
        content: "Нет сохранённых ключей";
        color: var(--muted);
        font-size: 12px;
      }
      .saved-item {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }
      .saved-item span {
        min-width: 0;
        color: var(--fg);
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .danger-button {
        padding: 6px 9px;
        background: transparent;
        color: var(--error-fg);
        border: 1px solid var(--error-border);
        font-size: 11px;
        font-weight: 700;
      }
      .danger-button:hover {
        background: var(--error-bg);
      }
      .file-input { display: none; }
    </style>
  </head>
  <body>
    <header class="brand">
      <div class="brand-mark" aria-hidden="true">
        <img src="icon-48.png" alt="" />
      </div>
      <div>
        <div class="brand-name">NebulaEncrypt</div>
        <div class="brand-tagline">Local-first privacy layer</div>
      </div>
      <div class="brand-badge">v1.0</div>
    </header>

    <main class="shell">
      <div class="command-bar">
        <button type="button" class="btn-action btn-encrypt" id="btnEncrypt" title="Зашифровать текст в поле ввода на открытой вкладке">
          <span class="button-symbol" aria-hidden="true">&#x1F512;</span>
          <span>Зашифровать</span>
        </button>
        <button type="button" class="btn-action btn-decrypt" id="btnDecrypt" title="Расшифровать сообщения на странице">
          <span class="button-symbol" aria-hidden="true">&#x1F513;</span>
          <span>Расшифровать</span>
        </button>
      </div>

      <div class="context-row">
        <span class="context-chip" id="serviceDetect">Определение вкладки</span>
        <span class="key-state" id="keyState">Ключи не выбраны</span>
      </div>

      <section class="section">
        <div class="field">
          <label for="serviceSelect">Сервис</label>
          <select id="serviceSelect">
            <option value="https://web.telegram.org/">Telegram</option>
            <option value="https://web.max.ru/">MAX</option>
          </select>
        </div>
        <div class="field">
          <label for="pageUrl">URL</label>
          <input type="url" id="pageUrl" placeholder="https://..." readonly />
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Ключи чата</h2>
        </div>

        <div class="field">
          <label for="myKey">Ваш ключ</label>
          <div class="key-row">
            <input type="password" id="myKey" placeholder="Введите ключ" autocomplete="off" />
            <button type="button" class="icon-button" id="genMyKey" title="Сгенерировать случайный ключ" aria-label="Сгенерировать ваш ключ">&#x2726;</button>
            <button type="button" class="icon-button" id="toggleMyKey" title="Показать/скрыть" aria-label="Показать или скрыть ваш ключ" aria-pressed="false">&#x25D0;</button>
          </div>
          <div class="strength-bar" id="myKeyStrength"><div class="fill"></div></div>
        </div>

        <div class="field">
          <label for="peerKey">Ключ собеседника</label>
          <div class="key-row">
            <input type="password" id="peerKey" placeholder="Введите ключ" autocomplete="off" />
            <button type="button" class="icon-button" id="genPeerKey" title="Сгенерировать случайный ключ" aria-label="Сгенерировать ключ собеседника">&#x2726;</button>
            <button type="button" class="icon-button" id="togglePeerKey" title="Показать/скрыть" aria-label="Показать или скрыть ключ собеседника" aria-pressed="false">&#x25D0;</button>
          </div>
          <div class="strength-bar" id="peerKeyStrength"><div class="fill"></div></div>
        </div>

        <button type="button" class="primary-button" id="saveKeys">Сохранить ключи</button>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Бэкап</h2>
        </div>
        <div class="field">
          <label for="backupPassphrase">Пароль резервной копии</label>
          <div class="key-row backup-row">
            <input type="password" id="backupPassphrase" placeholder="Для экспорта и импорта" autocomplete="off" />
            <button type="button" class="icon-button" id="toggleBackupPassphrase" title="Показать/скрыть" aria-label="Показать или скрыть пароль резервной копии" aria-pressed="false">&#x25D0;</button>
          </div>
        </div>
        <div class="actions-row">
          <button type="button" class="secondary-button" id="exportKeys">Экспорт</button>
          <button type="button" class="secondary-button" id="importKeysBtn">Импорт</button>
          <input type="file" id="importFile" accept=".json" class="file-input" />
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Сохранённые сайты</h2>
        </div>
        <div id="savedUrls" class="saved-list"></div>
      </section>
    </main>

    <script src="extension-api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
